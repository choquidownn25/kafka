server:
  port: 9096

api:
  base:
    path: http://localhost:9096

spring:
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: group_id
      enable-auto-commit: false

  datasource:
    url: jdbc:mysql://localhost:3306/propertyfkadatabase?createDatabaseIfNotExist=true&autoReconnect=true&useSSL=false
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect